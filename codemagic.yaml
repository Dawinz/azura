# Monorepo entry for Codemagic (canonical repo: github.com/Dawinz/azura).
# In Codemagic → Application settings → Repository URL, use:
#   https://github.com/Dawinz/azura
# Flutter project lives in azura-frontend/ (not the legacy azura-frontend-only mirror).
#
# If your app still points at github.com/Dawinz/azura-frontend, either switch to this repo
# or enable .github/workflows/sync-frontend-mirror.yml so the mirror stays in sync.

workflows:
  ios-azura:
    name: Azura iOS (IPA → App Store)
    working_directory: azura-frontend
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: applestoreconnectkey

    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.azura.azuramall
      vars:
        API_BASE_URL: "https://azuramall.shop"

    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build IPA
        script: |
          BUILD_NUMBER=${BUILD_NUMBER:-1}
          flutter build ipa --release \
            --build-name=1.0.$BUILD_NUMBER \
            --build-number=$BUILD_NUMBER \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
